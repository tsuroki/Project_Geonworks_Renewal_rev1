<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="swiper-slide morenvy-banner slide{#num}">
        <a href="{#link_1}" target="{#target_1}">{#imgTag_1}</a>
        <div class="buy_btn">
            <a href="{#link_1}" target="{#target_1}"><span>BUY NOW</span></a>
        </div>
        <div class="banner_text">
            <h1>{#text_1}</h1>
            <p>{#displayBeginTime} - {#displayEndTime}</p>
        </div>
    </div>
    <div class="morenvy-banner swiper-slide slide2">
        {#imgTag_2_or_video_2}

        <div class="buy_btn">
            <a href="{#link_2}" target="{#target_2}"><span>BUY NOW</span></a>
        </div>
        <div class="banner_text">
            <h1>{#text_2}</h1>
            <p>{#displayBeginTime} - {#displayEndTime}</p>
        </div>
    </div>
</body>

</html>
