<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/detailpage.css">
    <script src="./js/custumjs.js" defer></script>
</head>

<body>
    <div class="imgArea" module="product_image">
        <!--@js(/js/module/product/product_image.js)-->

        <div class="RW">
            <div class="prdImg">
                <div class="thumbnail">
                    <a href="/product/image_zoom2.html{$zoom_param}" alt="{$product_code}"
                        onclick="window.open(this.href, 'image_zoom2', 'toolbar=no,scrollbars=auto,resizable=yes,width=450,height=693,left=0,top=0', this);return false;">
                        <img src="{$big_img}" alt="{$seo_alt_tag}" class="{$big_img_class} {$img_display|display}"
                            loading="lazy" ez-prevent="img"><span module="product_Imagestyle"><span
                                class="prdIcon {$icon_class_name}"
                                style="background-image:url('{$icon_url}');"></span></span>
                    </a>
                    <span class="wish">{$wish_icon}</span>
                    <div id="zoom_wrap"></div>
                </div>
            </div>

            <div class="listImg" module="product_addimage">
                <div class="inner">
                    <ul class="list">
                        <li>{$add_img}</li>
                        <li>{$add_img}</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="RTMB">
            <p class="prdImg">
                <a href="#none" id="prdDetailImg" data-param="{$zoom_param}" class="thumbnail">
                    <img src="{$big_img}" class="bigImage" alt="{$seo_alt_tag}" loading="lazy" ez-prevent="img"><span
                        module="product_Imagestyle"><span class="prdIcon {$icon_class_name}"
                            style="background-image:url('{$icon_url}');"></span></span>
                    <span class="wish">{$wish_icon}</span>
                </a>
            </p>
            <div module="Product_mobileImage" class="prdImg">
                <!--@css(/css/module/product/mobileImage.css)-->
                <!--
                        $swipe = yes
                    -->
                <ul>
                    <li data-param="{$zoom_param}">
                        <p class="thumbnail">
                            <img src="{$big_img}" class="{$thumb_img_class}" alt="{$seo_alt_tag}" loading="lazy"
                                ez-prevent="img"><span module="product_Imagestyle"><span
                                    class="prdIcon {$icon_class_name}"
                                    style="background-image:url('{$icon_url}');"></span></span>
                        </p>
                    </li>
                    {$aAddImage}
                </ul>
            </div>
        </div>

        <div id="productDetail" class="section" module="product_additional" data-ez="contents-1r0ocq1-1">
            <!--@css(/css/module/product/additional.css)-->
            <!--@import(/board/report_popup.html)-->
            <div class="detail_tab">
                <ul class="cboth title_detail">
                    <li class="tab_open detailPage">
                        <a href="#detail">
                            <div id="detail">
                                <span>상세 페이지</span>
                            </div>
                            <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <mask id="mask0_649_162" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="0" y="0"
                                    width="30" height="30">
                                    <rect x="30" y="1.31134e-06" width="30" height="30"
                                        transform="rotate(90 30 1.31134e-06)" fill="#D9D9D9" />
                                </mask>
                                <g mask="url(#mask0_649_162)">
                                    <path d="M20.2881 8.125L21.5381 8.125L21.5381 21.875L20.2881 21.875L20.2881 8.125ZM7.76902 9.25L8.6534 8.36531L15.2881 15L8.6534 21.6347L7.76902 20.75L13.519 15L7.76902 9.25Z"fill="#1C1B1F"/>
                                </g>
                            </svg>
                        </a>
                    </li>
                    <li class="tab_open reviewPage">
                        <a href="#review">
                        <div id="review">
                            <span>리뷰</span>
                            <span>{$review_count}</span>
                        </div>
                        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <mask id="mask0_649_162" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="0" y="0"
                                width="30" height="30">
                                <rect x="30" y="1.31134e-06" width="30" height="30"
                                    transform="rotate(90 30 1.31134e-06)" fill="#D9D9D9" />
                            </mask>
                            <g mask="url(#mask0_649_162)">
                                <path d="M20.2881 8.125L21.5381 8.125L21.5381 21.875L20.2881 21.875L20.2881 8.125ZM7.76902 9.25L8.6534 8.36531L15.2881 15L8.6534 21.6347L7.76902 20.75L13.519 15L7.76902 9.25Z"fill="#1C1B1F"/>
                            </g>
                        </svg>
                        </a>
                    </li>
                    <li class="qnaPage">
                        <a href="#qna">
                            <div id="qna">
                                <span>상품문의</span>
                                <span>{$qna_count}</span>
                            </div>
                            <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <mask id="mask0_649_162" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="0" y="0"
                                    width="30" height="30">
                                    <rect x="30" y="1.31134e-06" width="30" height="30"
                                        transform="rotate(90 30 1.31134e-06)" fill="#D9D9D9" />
                                </mask>
                                <g mask="url(#mask0_649_162)">
                                    <path d="M20.2881 8.125L21.5381 8.125L21.5381 21.875L20.2881 21.875L20.2881 8.125ZM7.76902 9.25L8.6534 8.36531L15.2881 15L8.6534 21.6347L7.76902 20.75L13.519 15L7.76902 9.25Z"fill="#1C1B1F"/>
                                </g>
                            </svg>
                        </a>
                    </li>
                    <li class="guidePage">
                        <a href="#guide">
                            <div id="guide">
                                <span>배송/교환/반품 안내</span>
                            </div>
                            <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <mask id="mask0_649_162" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="0" y="0"
                                    width="30" height="30">
                                    <rect x="30" y="1.31134e-06" width="30" height="30"
                                        transform="rotate(90 30 1.31134e-06)" fill="#D9D9D9" />
                                </mask>
                                <g mask="url(#mask0_649_162)">
                                    <path d="M20.2881 8.125L21.5381 8.125L21.5381 21.875L20.2881 21.875L20.2881 8.125ZM7.76902 9.25L8.6534 8.36531L15.2881 15L8.6534 21.6347L7.76902 20.75L13.519 15L7.76902 9.25Z"fill="#1C1B1F"/>
                                </g>
                            </svg>
                        </a>
                    </li>
                </ul><!-- //title_detail -->
            </div><!-- //detail_tab -->
        </div><!-- //productDetail -->

    </div>
</body>

</html>
